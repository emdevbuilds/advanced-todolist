version: "3.8"

services:
  web:
    depends_on:
      - api
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}

    develop:
      watch:
        - path: ./client/package.json
          action: rebuild
        - path: ./client/package-lock.json
          action: rebuild
        - path: ./client/
          target: /app
          action: sync
  api:
    depends_on:
      - db
    build: ./server
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: ${MONGO_URI}
      PORT: ${PORT}
      CLIENT_URL: ${CLIENT_URL}
    develop:
      watch:
        - path: ./server/package.json
          action: rebuild
        - path: ./server/package-lock.json
          action: rebuild
        - path: ./server/
          target: /app
          action: sync

  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
# define the volumes to be used by the services
volumes:
  mongodb_data:
